<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>세니얼 Senial - 올자동 쇼츠 생성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>세니얼 Senial</h1>
      <p>음성 → 자막 싱크 → 장면 이미지 → 썸네일 → 쇼츠 영상</p>
    </div>
    <div class="topActions">
      <button id="btnAutoMode" class="primary big">올자동 모드</button>
      <button id="btnSaveProject" class="secondary">프로젝트 저장</button>
      <button id="btnLoadProject" class="secondary">불러오기</button>
      <input id="projectFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <main class="appGrid">
    <aside class="leftPane panel">
      <h2>1. 입력</h2>
      <label>OpenAI API Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
      <p class="hint">GitHub Pages 테스트용입니다. 실제 판매용은 서버형으로 전환해야 API 키가 안전합니다.</p>

      <label>음성 파일</label>
      <input id="audioFile" type="file" accept="audio/*" />

      <label>배경음악 선택</label>
      <input id="bgmFile" type="file" accept="audio/*" />

      <label>로고 선택</label>
      <input id="logoFile" type="file" accept="image/*" />

      <label>전체 이미지 한 번에 넣기</label>
      <input id="bulkImageFiles" type="file" accept="image/*" multiple />

      <div class="grid2">
        <button id="btnTranscribe">AI 자막 생성</button>
        <button id="btnSample" class="secondary">샘플 넣기</button>
      </div>

      <h2>2. 장면 자동 구성</h2>
      <label>이미지 배치 기준</label>
      <select id="imagePerCaptions">
        <option value="1">자막 1칸당 이미지 1장</option>
        <option value="2" selected>자막 2칸당 이미지 1장</option>
        <option value="3">자막 3칸당 이미지 1장</option>
        <option value="custom">직접 설정</option>
      </select>
      <label>직접 설정 칸수</label>
      <input id="customPerCaptions" type="number" min="1" max="10" value="2" />
      <button id="btnBuildScenes">장면 다시 만들기</button>

      <label>이미지 스타일</label>
      <select id="imageStyle">
        <option value="realistic">실사</option>
        <option value="ghibli">지브리 감성풍</option>
        <option value="pixar">픽사풍 3D</option>
        <option value="webtoon">웹툰풍</option>
      </select>
      <label class="checkLine"><input id="useCaptionForImage" type="checkbox" /> 이미지 프롬프트에 자막 내용 포함</label>
      <p class="hint">기본은 자막 제외입니다. 이미지 안에 글씨가 생기는 걸 줄입니다.</p>
      <button id="btnAiAll" class="primary">전체 장면 AI 이미지 생성</button>

      <h2>3. 출력 설정</h2>
      <label>영상 빠르기</label>
      <div class="speedRow">
        <select id="speedPreset">
          <option value="0.8">0.8</option>
          <option value="0.9">0.9</option>
          <option value="1" selected>1.0</option>
          <option value="1.1">1.1</option>
          <option value="1.2">1.2</option>
          <option value="1.3">1.3</option>
          <option value="1.5">1.5</option>
          <option value="2">2.0</option>
        </select>
        <input id="speedInput" type="number" min="0.5" max="3" step="0.01" value="1.00" />
      </div>

      <label>자막 크기</label>
      <input id="fontSize" type="range" min="22" max="120" value="58" />
      <div class="rangeValue"><span id="fontSizeValue">58</span>px</div>

      <label>자막 위치</label>
      <select id="captionPos">
        <option value="bottom" selected>하단</option>
        <option value="center">중앙</option>
        <option value="top">상단</option>
      </select>
    </aside>

    <section class="centerPane panel">
      <div class="previewHeader">
        <h2>미리보기</h2>
        <div class="previewBtns">
          <button id="btnPreview">재생</button>
          <button id="btnStopPreview" class="secondary">정지</button>
          <button id="btnRender" class="primary">영상 생성</button>
        </div>
      </div>
      <div class="previewWrap">
        <canvas id="canvas" width="540" height="960"></canvas>
      </div>
      <audio id="audio" controls></audio>
      <a id="downloadLink" class="download" style="display:none">영상 다운로드</a>
      <pre id="log">대기 중...</pre>
    </section>

    <aside class="rightPane panel">
      <h2>브루형 장면 편집</h2>
      <p class="hint">자막은 1줄, 2줄, 3줄 이상 마음대로 Enter로 수정하세요. 각 장면마다 이미지 업로드/AI 생성/움직임 변경이 가능합니다.</p>
      <div class="toolbar stickyTools">
        <button id="btnAddCaption">자막칸 추가</button>
        <button id="btnSyncFix">싱크 보정</button>
        <button id="btnClear" class="danger">초기화</button>
      </div>
      <div id="sceneEditor" class="sceneEditor"></div>
    </aside>
  </main>

  <section class="thumbPanel panel">
    <h2>첫 이미지 썸네일 생성기</h2>
    <div class="thumbGrid">
      <input id="thumbTitle" placeholder="메인 제목" />
      <input id="thumbTop" placeholder="상단 문구" />
      <input id="thumbBottom" placeholder="하단 문구" />
      <button id="btnThumbnail">첫 장면 썸네일 만들기</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
